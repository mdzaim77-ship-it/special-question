<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Question! ❤️</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden; /* Prevents scrollbars when hearts float up */
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            z-index: 10; /* Keeps card on top of hearts */
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.6rem;
            margin-bottom: 25px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        p {
            color: #555;
            font-size: 1.2rem;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .primary-btn, #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        .primary-btn:hover, #yesBtn:hover {
            background-color: #ff758f;
            transform: scale(1.05);
        }

        #noBtn {
            background-color: #f0f0f0;
            color: #555;
        }

        #noBtn:hover {
            background-color: #e0e0e0;
        }

        /* Styles for Tahu images */
        .food-comparison {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            gap: 10px;
        }
        
        .food-item {
            width: 48%;
        }
        
        .food-item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .food-item p {
            font-size: 1rem;
            margin-top: 8px;
            font-weight: bold;
            color: #444;
        }

        .meme-img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Continuous Floating Heart Animation */
        .heart {
            position: fixed;
            bottom: -50px;
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
            animation: floatUp 1.8s linear infinite; /* Faster float up speed */
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Instant Heart Explosion Animation */
        .burst-heart {
            position: fixed;
            user-select: none;
            pointer-events: none;
            z-index: 99;
            animation: burst 1.2s ease-out forwards;
        }

        @keyframes burst {
            0% {
                transform: translate(0, 0) scale(0.3);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1.8) rotate(var(--rot));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <!-- Screen 1: Intro Question 1 -->
        <h1>Elsaa... Boleh sy tanya satu soalan tak?</h1>
        <button class="primary-btn" onclick="showIntro2()">Boleh</button>
        <button class="primary-btn" onclick="showIntro2a()">Tak boleh</button>
    </div>

    <script>
        const noMessages = [
            "Confirm ka ni? ",
            "Taknak fikir masak masak dulu ka? ",
            "Pleaseeeeee? ",
            "Nanti sy bagi hadiah! ",
            "Tengok button yes tu makin besar laa! ",
            "Taknak tekan yes ka? "
        ];

        let messageIndex = 0;
        let yesScale = 1;

        // Screen 2
        function showIntro2() {
            const card = document.getElementById("card");
            card.innerHTML = `
                <h1>Betul ka Elsaa nak tahu?</h1>
                <button class="primary-btn" onclick="showIntro3()">Ya</button>
                <button class="primary-btn" onclick="showIntro3()">Tidak</button>
            `;
        }
        function showIntro2a() {
            const card = document.getElementById("card");
            card.innerHTML = `
                <h1>Betul ka Elsaa tanak tahu?</h1>
                <button class="primary-btn" onclick="showIntro3()">Ya</button>
                <button class="primary-btn" onclick="showIntro3()">Tidak</button>
            `;
        }

        // Screen 3: Shows Tahu Goreng vs Tahu Rebus
        function showIntro3() {
            const card = document.getElementById("card");
            card.innerHTML = `
                <h1>Elsaa mahu tahu goreng atau rebus?</h1>
                
                <div class="food-comparison">
                    <div class="food-item">
                        <img src="tahu_goreng.jpeg" alt="Tauhu Goreng">
                        <p>Tauhu Goreng</p>
                    </div>
                    <div class="food-item">
                        <img src="tahu_rebus.jpeg" alt="Tauhu Rebus">
                        <p>Tauhu Rebus</p>
                    </div>
                </div>

                <div class="btn-container">
                    <button class="primary-btn" onclick="showPunScreen()">Tahu Goreng</button>
                    <button class="primary-btn" onclick="showPunScreen()">Tahu Rebus</button>
                </div>
            `;
        }

        // Pun Reveal Screen: "Hanya kita berdua yang tahu"
        function showPunScreen() {
            const card = document.getElementById("card");
            card.innerHTML = `
                <img src="hanya_kita_berdua.jpeg" class="meme-img" alt="Hanya kita berdua yang tahu">
                <button class="primary-btn" onclick="showMainQuestion()">HAHAHAHAHAHAHA okayy ii next!</button>
            `;
        }

        // Main Question Screen
        function showMainQuestion() {
            const card = document.getElementById("card");
            card.innerHTML = `
                <h1 id="questionText">Elsaa nak ka jadi partner sy? Maksud sy jadi girlfriend sy</h1>
                <div class="btn-container">
                    <button id="yesBtn" onclick="handleYes()">Yes!</button>
                    <button id="noBtn" onclick="handleNo()">No</button>
                </div>
            `;
        }

        function handleNo() {
            const questionText = document.getElementById("questionText");
            const yesBtn = document.getElementById("yesBtn");

            questionText.innerText = noMessages[messageIndex];
            
            if (messageIndex < noMessages.length - 1) {
                messageIndex++;
            }

            yesScale += 0.35;
            yesBtn.style.transform = `scale(${yesScale})`;
        }

        function handleYes() {
            const card = document.getElementById("card");
            card.innerHTML = `
                <h1 style="font-size: 2.2rem; color: #ff4d6d;">YAYY HAHAHAHAHAHA</h1>
                <p style="font-size: 1.2rem; color: #555;">Sooo maksudnya kita sudah official jadi partner la kann hehe!!</p>
            `;

            // Trigger instant heart explosion + fast stream
            createHeartExplosion();
            startFastHeartShower();
        }

        // 1. Instant Explosion Effect (50 hearts shooting outward instantly)
        function createHeartExplosion() {
            const hearts = ["❤️", "💖", "💕", "💗", "💗", "💗", "💞"];
            const count = 50; 

            for (let i = 0; i < count; i++) {
                const heart = document.createElement("div");
                heart.classList.add("burst-heart");
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                
                // Position explosion from screen center
                heart.style.left = "50vw";
                heart.style.top = "50vh";

                // Random angles and distances for explosion trajectory
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 80 + 30; // 30vh to 110vh distance
                const tx = Math.cos(angle) * distance + "vw";
                const ty = Math.sin(angle) * distance + "vh";
                const rot = (Math.random() * 360) + "deg";

                heart.style.setProperty("--tx", tx);
                heart.style.setProperty("--ty", ty);
                heart.style.setProperty("--rot", rot);
                heart.style.fontSize = (Math.random() * 2 + 1.2) + "rem";

                document.body.appendChild(heart);

                setTimeout(() => heart.remove(), 1200);
            }
        }

        // 2. High-speed continuous shower (Spawns every 50ms)
        function startFastHeartShower() {
            const hearts = ["❤️", "💖", "💕", "💗", "💗", "💗", "💞", "❤️", "💖", "💕", "💗", "💗", "💗", "💞"];
            
            setInterval(() => {
                const heart = document.createElement("div");
                heart.classList.add("heart");
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 1 + 1) + "s"; // Fast float (1-2s)
                heart.style.fontSize = (Math.random() * 1.8 + 1.2) + "rem";

                document.body.appendChild(heart);

                setTimeout(() => heart.remove(), 2000);
            }, 50); // New heart every 50ms (5x faster stream!)
        }
    </script>

</body>
</html>
